<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Ménage — Studios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;padding:0 0 2rem}
.topbar{background:#fff;border-bottom:1px solid #e0e0d8;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:5px;transition:background 0.3s}
.sync-dot.ok{background:#1D9E75}
.sync-dot.err{background:#E24B4A}
.sync-dot.loading{background:#FAC775;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.container{max-width:960px;margin:0 auto;padding:1rem 1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px}
.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#333}
.nav-btn:hover{background:#f5f5f0}
.month-title{font-size:20px;font-weight:600}
.view-tabs{display:flex;gap:6px}
.tab{padding:6px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:12px;color:#666;background:#fff}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:0.75rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.status-bar{font-size:12px;color:#888;min-height:20px;margin-bottom:0.5rem;display:flex;align-items:center;gap:6px}
.spinner{width:12px;height:12px;border:2px solid #ddd;border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.top-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:0.75rem}
.filter-label{font-size:12px;color:#888}
.filter-chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555;transition:all 0.15s}
.filter-chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.day-header{text-align:center;font-size:11px;color:#999;padding:5px 0;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.day-cell{min-height:72px;border-radius:8px;border:1px solid #e8e8e2;padding:4px;background:#fff;cursor:default;transition:border-color 0.1s}
.day-cell:hover{border-color:#bbb}
.day-cell.other-month{opacity:0.3;background:#fafaf8}
.day-cell.today{border-color:#378ADD;border-width:2px}
.day-num{font-size:11px;color:#999;margin-bottom:2px;line-height:1}
.day-cell.today .day-num{color:#185FA5;font-weight:700}
.resa-block{border-radius:4px;font-size:10px;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;user-select:none}
.resa-block:active{opacity:0.8}
.resa-block.s1{background:#daeafe;color:#1047a0}
.resa-block.s2{background:#c6f0df;color:#075c3a}
.resa-block.checkout{background:#fde8b0;color:#7a4a00}
.assign-badge{font-size:9px;background:#f0f0eb;border-radius:3px;padding:1px 4px;margin-top:1px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.list-item{background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:0.875rem 1rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.1s}
.list-item:hover{border-color:#bbb}
.list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.list-info{flex:1;min-width:0}
.list-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-dates{font-size:11px;color:#888;margin-top:2px}
.list-assign{font-size:11px;padding:3px 10px;border-radius:8px;background:#f0f0eb;color:#555;white-space:nowrap;flex-shrink:0}
.list-assign.missing{background:#fde8e8;color:#a32d2d}
.settings-wrap{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}
.settings-card{background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:1rem 1.25rem}
.settings-card h4{font-size:13px;font-weight:600;margin-bottom:0.875rem}
.settings-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.settings-row label{font-size:12px;color:#888;width:72px;flex-shrink:0}
.settings-row input[type=text]{flex:1;min-width:200px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff}
.settings-row input[type=text]:focus{outline:none;border-color:#378ADD}
.btn-primary{background:#1a1a1a;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary:hover{background:#333}
.btn-danger{background:#fff;color:#a32d2d;border:1px solid #f0c0c0;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.btn-danger:hover{background:#fde8e8}
.btn-cancel{background:#fff;border:1px solid #ddd;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;color:#333}
.btn-cancel:hover{background:#f5f5f0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1rem}
.modal-field{margin-bottom:0.875rem}
.modal-field label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.modal-field select,.modal-field input[type=text]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.modal-meta{background:#f5f5f0;border-radius:8px;padding:0.75rem;margin-bottom:1rem;font-size:12px;color:#555;line-height:1.6}
.modal-meta strong{color:#1a1a1a;font-weight:600}
.cleaner-item{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.cleaner-item input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a}
.error-banner{background:#fde8e8;color:#a32d2d;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:0.75rem}
.empty-state{text-align:center;padding:3rem 1rem;color:#999;font-size:13px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.lastsync{font-size:11px;color:#aaa;margin-left:8px}
@media(max-width:600px){
  .calendar-grid{gap:2px}
  .day-cell{min-height:52px;padding:2px}
  .day-num{font-size:10px}
  .resa-block{font-size:9px;padding:1px 3px}
  .assign-badge{display:none}
  .month-title{font-size:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Planning Ménage</div>
    <div class="topbar-sub" id="topbar-sub">Studios</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#aaa">
    <span class="sync-dot loading" id="sync-dot"></span>
    <span id="sync-label">Connexion...</span>
  </div>
</div>

<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="month-title" id="month-title"></span>
      <div class="nav-btns">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
        <button class="nav-btn" onclick="changeMonth(0)">Auj.</button>
        <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div class="view-tabs">
      <button class="tab active" id="tab-cal" onclick="setView('cal')">Mois</button>
      <button class="tab" id="tab-list" onclick="setView('list')">Liste</button>
      <button class="tab" id="tab-settings" onclick="setView('settings')">&#9881;</button>
    </div>
  </div>

  <div id="status-bar" class="status-bar"></div>
  <div id="error-banner" style="display:none" class="error-banner"></div>

  <div id="view-content">
    <div class="top-controls" id="filter-bar"></div>
    <div class="legend" id="legend-bar"></div>
    <div id="calendar-view"></div>
    <div id="list-view" style="display:none"></div>
  </div>

  <div id="view-settings" style="display:none">
    <div class="settings-wrap">
      <div class="settings-card">
        <h4>Noms des studios</h4>
        <div class="settings-row">
          <label>Studio 1</label>
          <input type="text" id="name-s1">
        </div>
        <div class="settings-row">
          <label>Studio 2</label>
          <input type="text" id="name-s2">
        </div>
        <div style="margin-top:10px">
          <button class="btn-primary" onclick="saveNames()">Enregistrer</button>
        </div>
      </div>
      <div class="settings-card">
        <h4>Femmes de ménage</h4>
        <div id="cleaners-list"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" id="new-cleaner" placeholder="Prénom..." style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px">
          <button class="btn-primary" onclick="addCleaner()">Ajouter</button>
        </div>
      </div>
      <div class="settings-card" style="font-size:12px;color:#999;line-height:1.8">
        <h4 style="margin-bottom:6px;color:#1a1a1a">Synchronisation</h4>
        Les réservations Airbnb sont automatiquement mises à jour <strong style="color:#555">toutes les heures</strong> via GitHub Actions.<br>
        Les assignations et paramètres sont synchronisés en temps réel via Firebase sur tous les appareils.<br><br>
        <span id="last-sync-info" style="color:#aaa"></span>
      </div>
    </div>
  </div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBCbn51DxRdhBta7ZKN2BF9ZsDXsrDdeG4",
  authDomain: "planning-menage-18b09.firebaseapp.com",
  databaseURL: "https://planning-menage-18b09-default-rtdb.firebaseio.com",
  projectId: "planning-menage-18b09",
  storageBucket: "planning-menage-18b09.firebasestorage.app",
  messagingSenderId: "685094108459",
  appId: "1:685094108459:web:b90ec9f136de34d699996e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CLEANER_COLORS = ['#378ADD','#1D9E75','#D85A30','#9F3DBF','#C8860A','#2A8A6E','#c0392b'];

let S = {
  cleaners: ['Steffie','Emmy','Valérie','Myrtille','Pikpik'],
  studioNames: ['Studio 1','Studio 2'],
  assignments: {},
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  view: 'cal',
  filterCleaner: null,
  reservations: []
};

let fbReady = false;

function setSyncStatus(s, extra) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + s;
  lbl.textContent = s==='ok' ? (extra||'Synchronisé') : s==='err' ? 'Hors ligne' : 'Chargement...';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function fbSet(path, data) {
  set(ref(db, path), data)
    .then(() => setSyncStatus('ok'))
    .catch(() => setSyncStatus('err'));
}

let loadedFlags = {config: false, assignments: false, reservations: false};
function checkReady() {
  if(loadedFlags.config && loadedFlags.assignments && loadedFlags.reservations && !fbReady) {
    fbReady = true;
    setStatus('');
    render();
  }
}

setStatus('Chargement depuis Firebase...', true);

onValue(ref(db, 'config'), snap => {
  const d = snap.val();
  if(d) {
    S.cleaners = d.cleaners || S.cleaners;
    S.studioNames = d.studioNames || S.studioNames;
  } else {
    fbSet('config', { cleaners: S.cleaners, studioNames: S.studioNames });
  }
  setSyncStatus('ok');
  loadedFlags.config = true;
  if(fbReady) render();
  else checkReady();
}, () => { setSyncStatus('err'); loadedFlags.config=true; checkReady(); });

onValue(ref(db, 'assignments'), snap => {
  S.assignments = snap.val() || {};
  loadedFlags.assignments = true;
  if(fbReady) render();
  else checkReady();
});

onValue(ref(db, 'reservations'), snap => {
  const data = snap.val() || {};
  S.reservations = Object.values(data).map(r => ({
    ...r,
    start: new Date(r.start),
    end: new Date(r.end)
  }));
  loadedFlags.reservations = true;
  if(fbReady) render();
  else checkReady();
});

onValue(ref(db, 'lastSync'), snap => {
  const d = snap.val();
  if(d && d.ts) {
    const dt = new Date(d.ts);
    const fmt = dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('last-sync-info');
    if(el) el.textContent = `Dernière sync Airbnb : ${fmt} (${d.count} réservation(s))`;
    setSyncStatus('ok', `Sync ${fmt}`);
  }
});

function saveConfig() { fbSet('config', { cleaners: S.cleaners, studioNames: S.studioNames }); }
function saveAssignments() { fbSet('assignments', Object.keys(S.assignments).length ? S.assignments : null); }

function setStatus(msg, loading=false) {
  document.getElementById('status-bar').innerHTML = loading
    ? `<span class="spinner"></span><span>${msg}</span>`
    : `<span>${msg}</span>`;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = msg ? '' : 'none';
}

const getKey = r => r.uid;
const getAssigned = r => (S.assignments[getKey(r)]||{}).cleaner || null;
const getNote = r => (S.assignments[getKey(r)]||{}).note || '';
const cleanerColor = n => { const i=S.cleaners.indexOf(n); return i>=0 ? CLEANER_COLORS[i%CLEANER_COLORS.length] : '#aaa'; };

function getResasForDay(d, si) {
  const t = new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  return S.reservations.filter(r => {
    if(r.studio !== si) return false;
    const s=new Date(r.start.getFullYear(),r.start.getMonth(),r.start.getDate()).getTime();
    const e=new Date(r.end.getFullYear(),r.end.getMonth(),r.end.getDate()).getTime();
    return t>=s && t<e;
  });
}

function getCheckouts(d, si) {
  const t=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  return S.reservations.filter(r => r.studio===si &&
    new Date(r.end.getFullYear(),r.end.getMonth(),r.end.getDate()).getTime()===t);
}

function renderCalendar() {
  const yr=S.currentYear, mo=S.currentMonth;
  const first=new Date(yr,mo,1), last=new Date(yr,mo+1,0);
  let sd=first.getDay(); if(sd===0)sd=7;
  const today=new Date(); today.setHours(0,0,0,0);
  const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  let html=DAYS.map(d=>`<div class="day-header">${d}</div>`).join('');
  const cell=(d,other)=>{
    const isToday=d.getTime()===today.getTime();
    let inner=`<div class="day-num">${d.getDate()}</div>`;
    for(let si=0;si<2;si++){
      for(const r of getCheckouts(d,si)){
        const a=getAssigned(r);
        if(S.filterCleaner&&a!==S.filterCleaner) continue;
        inner+=`<div class="resa-block checkout" onclick="window._oa('${getKey(r)}')" title="Départ — ${S.studioNames[si]}">Départ S${si+1}</div>`;
        if(a) inner+=`<div class="assign-badge" style="color:${cleanerColor(a)}">${a}</div>`;
      }
      for(const r of getResasForDay(d,si)){
        const a=getAssigned(r);
        if(S.filterCleaner&&a!==S.filterCleaner) continue;
        const isStart=d.getTime()===new Date(r.start.getFullYear(),r.start.getMonth(),r.start.getDate()).getTime();
        if(isStart){
          inner+=`<div class="resa-block s${si+1}" onclick="window._oa('${getKey(r)}')" title="${r.summary}">S${si+1}</div>`;
          if(a) inner+=`<div class="assign-badge" style="color:${cleanerColor(a)}">${a}</div>`;
        }
      }
    }
    return `<div class="day-cell${other?' other-month':''}${isToday?' today':''}">${inner}</div>`;
  };
  for(let i=1;i<sd;i++) html+=cell(new Date(yr,mo,1-sd+i),true);
  for(let i=1;i<=last.getDate();i++) html+=cell(new Date(yr,mo,i),false);
  const rem=7-((sd-1+last.getDate())%7);
  if(rem<7) for(let i=1;i<=rem;i++) html+=cell(new Date(yr,mo+1,i),true);
  document.getElementById('calendar-view').innerHTML=`<div class="calendar-grid">${html}</div>`;
}

function renderList() {
  const now=new Date(); now.setHours(0,0,0,0);
  const all=S.reservations
    .filter(r=>new Date(r.end)>=now&&(!S.filterCleaner||getAssigned(r)===S.filterCleaner))
    .sort((a,b)=>a.start-b.start);
  if(!all.length){ document.getElementById('list-view').innerHTML='<div class="empty-state">Aucune réservation à venir</div>'; return; }
  const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  const COLS=['#378ADD','#1D9E75'];
  document.getElementById('list-view').innerHTML='<div class="list-view-wrap">'+all.map(r=>{
    const a=getAssigned(r);
    return `<div class="list-item" onclick="window._oa('${getKey(r)}')">
      <div class="list-dot" style="background:${COLS[r.studio]}"></div>
      <div class="list-info">
        <div class="list-name">${S.studioNames[r.studio]}</div>
        <div class="list-dates">${fmt(r.start)} → ${fmt(r.end)} · ${Math.round((r.end-r.start)/86400000)} nuit(s)</div>
      </div>
      <div class="list-assign${a?'':' missing'}">${a||'Non assigné'}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderFilterBar() {
  document.getElementById('filter-bar').innerHTML=
    `<span class="filter-label">Filtrer :</span>
    <button class="filter-chip${!S.filterCleaner?' active':''}" onclick="window._sf(null)">Toutes</button>`+
    S.cleaners.map(c=>`<button class="filter-chip${S.filterCleaner===c?' active':''}" onclick="window._sf('${c}')">${c}</button>`).join('');
}

function renderLegend() {
  document.getElementById('legend-bar').innerHTML=`
    <div class="legend-item"><div class="legend-dot" style="background:#daeafe"></div>${S.studioNames[0]}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c6f0df"></div>${S.studioNames[1]}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fde8b0"></div>Départ / ménage</div>`;
}

function renderSettings() {
  document.getElementById('name-s1').value=S.studioNames[0];
  document.getElementById('name-s2').value=S.studioNames[1];
  document.getElementById('cleaners-list').innerHTML=S.cleaners.map((c,i)=>`
    <div class="cleaner-item">
      <div style="width:10px;height:10px;border-radius:50%;background:${CLEANER_COLORS[i%CLEANER_COLORS.length]};flex-shrink:0"></div>
      <input type="text" value="${c}" onchange="S.cleaners[${i}]=this.value">
      <button class="btn-danger" onclick="window._rc(${i})">Suppr.</button>
    </div>`).join('');
}

function render() {
  const MO=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('month-title').textContent=MO[S.currentMonth]+' '+S.currentYear;
  document.getElementById('topbar-sub').textContent=S.studioNames.join(' · ');
  if(S.view!=='settings'){ renderFilterBar(); renderLegend(); S.view==='cal'?renderCalendar():renderList(); }
  else renderSettings();
}

function findResa(key) { return S.reservations.find(r=>getKey(r)===key)||null; }

window._oa = function(key) {
  const r=findResa(key); if(!r) return;
  const a=getAssigned(r)||'', note=getNote(r);
  const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const n=Math.round((r.end-r.start)/86400000);
  const opts=S.cleaners.map(c=>`<option value="${c}"${a===c?' selected':''}>${c}</option>`).join('');
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)window._cm()">
      <div class="modal">
        <h3>Assigner une intervenante</h3>
        <div class="modal-meta">
          <strong>${S.studioNames[r.studio]}</strong><br>
          Arrivée : ${fmt(r.start)}<br>
          Départ : ${fmt(r.end)} (${n} nuit${n>1?'s':''})<br>
          ${r.summary&&r.summary!=='Réservation'?'Voyageur : '+r.summary:''}
        </div>
        <div class="modal-field">
          <label>Femme de ménage</label>
          <select id="mc"><option value="">— Aucune —</option>${opts}</select>
        </div>
        <div class="modal-field">
          <label>Note (optionnel)</label>
          <input type="text" id="mn" placeholder="Ex: clé boîte, code entrée..." value="${note}">
        </div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="window._cm()">Annuler</button>
          <button class="btn-primary" onclick="window._sa('${key}')">Enregistrer</button>
        </div>
      </div>
    </div>`;
};

window._sa = function(key) {
  const c=document.getElementById('mc').value;
  const n=document.getElementById('mn').value;
  if(c) S.assignments[key]={cleaner:c,note:n};
  else delete S.assignments[key];
  saveAssignments();
  showToast(c?`Assigné à ${c} ✓`:'Assignation supprimée');
  window._cm(); render();
};

window._cm = () => document.getElementById('modal-container').innerHTML='';
window._sf = n => { S.filterCleaner=n; render(); };
window._rc = i => { if(!confirm('Supprimer '+S.cleaners[i]+' ?')) return; S.cleaners.splice(i,1); saveConfig(); renderSettings(); };
window.addCleaner = () => { const inp=document.getElementById('new-cleaner'),n=inp.value.trim(); if(!n||S.cleaners.includes(n)) return; S.cleaners.push(n); saveConfig(); renderSettings(); inp.value=''; showToast(n+' ajouté ✓'); };
window.saveNames = () => { S.studioNames[0]=document.getElementById('name-s1').value||'Studio 1'; S.studioNames[1]=document.getElementById('name-s2').value||'Studio 2'; saveConfig(); showToast('Noms enregistrés ✓'); render(); };
window.changeMonth = d => { if(d===0){S.currentMonth=new Date().getMonth();S.currentYear=new Date().getFullYear();}else{S.currentMonth+=d;if(S.currentMonth>11){S.currentMonth=0;S.currentYear++;}if(S.currentMonth<0){S.currentMonth=11;S.currentYear--;}} render(); };
window.setView = v => { S.view=v; ['cal','list','settings'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===v);}); document.getElementById('view-content').style.display=v!=='settings'?'':'none'; document.getElementById('view-settings').style.display=v==='settings'?'':'none'; render(); };

render();
</script>
</body>
</html>
