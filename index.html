<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Ménage — Studios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;padding:0 0 2rem}
.topbar{background:#fff;border-bottom:1px solid #e0e0d8;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:5px;transition:background 0.3s}
.sync-dot.ok{background:#1D9E75}
.sync-dot.err{background:#E24B4A}
.sync-dot.loading{background:#FAC775;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.container{max-width:960px;margin:0 auto;padding:1rem 1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0;margin-bottom:0;flex-wrap:wrap;gap:8px}
.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#333}
.nav-btn:hover{background:#f5f5f0}
.month-title{font-size:20px;font-weight:600}
.topbar-btns{display:flex;gap:6px}
.settings-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px;color:#555;line-height:1;text-decoration:none;display:flex;align-items:center}
.settings-btn:hover{background:#f5f5f0}
.settings-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.logout-btn{background:#fff;border:1px solid #f0c0c0;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;color:#a32d2d}
.logout-btn:hover{background:#fde8e8}
.status-bar{font-size:12px;color:#888;min-height:0;margin-bottom:0;display:flex;align-items:center;gap:6px}
.spinner{width:12px;height:12px;border:2px solid #ddd;border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:0.6rem}
.kpi-card{background:#fff;border:1px solid #e8e8e2;border-radius:10px;padding:0.5rem 0.6rem;text-align:center}
.kpi-value{font-size:19px;font-weight:700;line-height:1;margin-bottom:3px;transition:color 0.3s}
.kpi-value.green{color:#1D9E75}
.kpi-value.orange{color:#F59E0B}
.kpi-value.red{color:#E24B4A}
.kpi-label{font-size:10px;color:#aaa;line-height:1.3}
.kpi-filter-card{background:#fff;border:1px solid #e8e8e2;border-radius:10px;padding:0.5rem 0.6rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.kpi-filter-btns{display:flex;flex-direction:column;gap:4px;width:100%}
.kpi-filter-btn{padding:3px 8px;border-radius:12px;font-size:10px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555;transition:all 0.12s;line-height:1.4;text-align:center}
.kpi-filter-btn.arr.active{background:#1047a0;color:#fff;border-color:#1047a0}
.kpi-filter-btn.dep.active{background:#7a4a00;color:#fff;border-color:#7a4a00}

/* Controls */
.controls-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555;transition:all 0.12s;white-space:nowrap}
.chip:hover{border-color:#bbb}

/* Calendar */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:0.5rem}
.day-header{text-align:center;font-size:11px;color:#999;padding:4px 0;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.day-cell{min-height:72px;border-radius:8px;border:1px solid #e8e8e2;padding:4px;background:#fff;transition:border-color 0.1s}
.day-cell:hover{border-color:#bbb}
.day-cell.other-month{opacity:0.3;background:#fafaf8}
.day-cell.today{border-color:#378ADD;border-width:2px}
.day-num-row{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.day-num{font-size:11px;color:#999;line-height:1}
.day-cell.today .day-num{color:#185FA5;font-weight:700}
.status-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.status-pip.red{background:#E24B4A}
.status-pip.orange{background:#F59E0B}
.resa-block{border-radius:4px;font-size:10px;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;user-select:none;line-height:1.3}
.resa-block:active{opacity:0.75}
.resa-block.s1{background:#daeafe;color:#1047a0}
.resa-block.s2{background:#c6f0df;color:#075c3a}
.resa-block.checkout{background:#fde8b0;color:#7a4a00}
.assign-wrap{margin-top:1px;margin-bottom:2px}
.assign-badge{display:inline-block;font-size:9px;background:#f0f0eb;border-radius:3px;padding:1px 4px;color:#555;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:0.5rem;padding:0.5rem 0;border-top:1px solid #e8e8e2;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend-pip{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Settings */
.settings-wrap{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}
.settings-card{background:#fff;border:1px solid #e8e8e2;border-radius:12px;padding:1rem 1.25rem}
.settings-card h4{font-size:13px;font-weight:600;margin-bottom:0.875rem}
.settings-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.settings-row label{font-size:12px;color:#888;width:72px;flex-shrink:0}
.settings-row input[type=text]{flex:1;min-width:200px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff}
.settings-row input[type=text]:focus{outline:none;border-color:#378ADD}
.btn-primary{background:#1a1a1a;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary:hover{background:#333}
.btn-danger{background:#fff;color:#a32d2d;border:1px solid #f0c0c0;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.btn-danger:hover{background:#fde8e8}
.btn-cancel{background:#fff;border:1px solid #ddd;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;color:#333}
.btn-cancel:hover{background:#f5f5f0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.12);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1rem}
.modal-field{margin-bottom:0.875rem}
.modal-field label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.modal-field select,.modal-field input[type=text]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.modal-meta{background:#f5f5f0;border-radius:8px;padding:0.75rem;margin-bottom:1rem;font-size:12px;color:#555;line-height:1.6}
.modal-meta strong{color:#1a1a1a;font-weight:600}
.modal-section-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin:1rem 0 0.5rem}
.cleaner-item{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.cleaner-item input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a}

/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem;padding:2rem}
.login-icon{font-size:48px}
.login-title{font-size:18px;font-weight:600}
.login-sub{font-size:13px;color:#888;text-align:center}
.login-select{width:100%;max-width:260px;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;color:#1a1a1a;background:#fff}
.login-input{width:100%;max-width:260px;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;text-align:center;letter-spacing:4px}
.login-input:focus,.login-select:focus{outline:none;border-color:#378ADD}
.login-error{color:#E24B4A;font-size:12px}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:600px){
  .calendar-grid{gap:2px}
  .day-cell{min-height:60px;padding:3px}
  .day-num{font-size:10px}
  .resa-block{font-size:9px;padding:1px 3px}
  .assign-badge{font-size:8px;padding:1px 3px}
  .month-title{font-size:16px}
  .chip{font-size:10px;padding:3px 8px}
  .status-pip{width:5px;height:5px}
  .kpi-value{font-size:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Planning Ménage</div>
    <div class="topbar-sub" id="topbar-sub">Studios</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="sync-dot loading" id="sync-dot"></span>
    <span id="sync-label" style="font-size:11px;color:#aaa">Connexion...</span>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">
  <div class="login-screen">
    <div class="login-icon">🔑</div>
    <div class="login-title">Planning Ménage</div>
    <div class="login-sub">Identifiez-vous pour accéder<br>au planning</div>
    <select class="login-select" id="login-name">
      <option value="">— Choisissez votre nom —</option>
    </select>
    <input type="password" class="login-input" id="login-pwd" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error" style="display:none">Mot de passe incorrect</div>
    <button class="btn-primary" onclick="doLogin()">Connexion</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="month-title" id="month-title"></span>
      <div class="nav-btns">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
        <button class="nav-btn" onclick="changeMonth(0)">Auj.</button>
        <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="current-user-badge" style="font-size:11px;color:#888;display:none"></span>
      <button id="logout-btn" class="logout-btn" onclick="doLogout()" style="display:none">Déco.</button>
      <a href="admin.html" class="settings-btn" id="admin-link" style="display:none" title="Administration">&#128274;</a>
    </div>
  </div>

  <div id="status-bar" class="status-bar"></div>

  <div id="view-calendar">
    <div class="kpi-bar" id="kpi-bar"></div>
    <div class="controls-row" id="controls-row"></div>
    <div id="calendar-view"></div>
    <div class="legend" id="legend-bar"></div>
  </div>
</div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue, push as fbPush } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBCbn51DxRdhBta7ZKN2BF9ZsDXsrDdeG4",
  authDomain: "planning-menage-18b09.firebaseapp.com",
  databaseURL: "https://planning-menage-18b09-default-rtdb.firebaseio.com",
  projectId: "planning-menage-18b09",
  storageBucket: "planning-menage-18b09.firebasestorage.app",
  messagingSenderId: "685094108459",
  appId: "1:685094108459:web:b90ec9f136de34d699996e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const CLEANER_COLORS = ['#378ADD','#1D9E75','#D85A30','#9F3DBF','#C8860A','#2A8A6E','#c0392b'];
const SESSION_KEY = 'menage_session_v1';

// ─── Logs d'activité ──────────────────────────────────────────────────────────
async function logActivity(type, user, detail = '') {
  try {
    await fbPush(ref(db, 'activityLogs'), {
      ts: new Date().toISOString(),
      type,   // 'login' | 'logout' | 'assign' | 'unassign'
      user: user || '—',
      detail: detail || ''
    });
  } catch(e) { console.warn('logActivity:', e); }
}

let S = {
  cleaners: [],
  studioNames: ['Studio 1','Studio 2'],
  assignments: {},
  reservations: [],
  adminConfig: { authEnabled: false, accounts: [] },
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  showSettings: false,
  filterCleaner: null,
  filterType: 'dep',
  currentUser: null  // { name, menage, admin }
};

let fbReady = false;
const loaded = { config: false, assignments: false, reservations: false, adminConfig: false };

// ─── Session ──────────────────────────────────────────────────────────────────

function saveSession(user){
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch(e){}
}

function loadSession(){
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e){ return null; }
}

function clearSession(){
  try { localStorage.removeItem(SESSION_KEY); } catch(e){}
}

function hashSimple(str){
  let h=0;
  for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0;
  return h.toString(36);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────

function checkAuth(){
  const authEnabled = S.adminConfig?.authEnabled || false;
  if(!authEnabled){
    if(!S.currentUser){
      S.currentUser = { name:'', menage:true, admin:true, noAuth:true };
    }
    showApp();
    return;
  }
  const session = loadSession();
  if(session){
    const acc = (S.adminConfig.accounts||[]).find(a=>a.name===session.name);
    if(acc){
      S.currentUser = { name:acc.name, menage:acc.menage, admin:acc.admin };
      showApp();
      return;
    }
  }
  S.currentUser = null;
  showLogin();
}

function el(id){ return document.getElementById(id); }

function showApp(){
  if(el('login-screen')) el('login-screen').style.display='none';
  if(el('main-app')) el('main-app').style.display='';
  const noAuth=S.currentUser?.noAuth;
  if(el('logout-btn')) el('logout-btn').style.display=noAuth?'none':'';
  const badge=el('current-user-badge');
  if(badge){
    if(!noAuth && S.currentUser?.name){
      badge.textContent=S.currentUser.name;
      badge.style.display='';
    } else {
      badge.style.display='none';
    }
  }
  const isAdmin=!S.currentUser||S.currentUser.noAuth||S.currentUser.admin;
  if(el('admin-link')) el('admin-link').style.display=isAdmin?'':'none';
  render();
}

function showLogin(){
  if(el('login-screen')) el('login-screen').style.display='';
  if(el('main-app')) el('main-app').style.display='none';
  const accounts=S.adminConfig.accounts||[];
  const sel=el('login-name');
  if(sel) sel.innerHTML='<option value="">— Choisissez votre nom —</option>'+
    accounts.map(a=>`<option value="${a.name}">${a.name}</option>`).join('');
}

window.doLogin = function(){
  const name=document.getElementById('login-name').value;
  const pwd=document.getElementById('login-pwd').value;
  if(!name){ document.getElementById('login-error').style.display=''; document.getElementById('login-error').textContent='Choisissez votre nom'; return; }
  const acc=(S.adminConfig.accounts||[]).find(a=>a.name===name);
  if(!acc){ document.getElementById('login-error').style.display=''; document.getElementById('login-error').textContent='Compte introuvable'; return; }
  if(acc.pwdHash && hashSimple(pwd)!==acc.pwdHash){
    document.getElementById('login-error').style.display='';
    document.getElementById('login-error').textContent='Mot de passe incorrect';
    document.getElementById('login-pwd').value='';
    return;
  }
  document.getElementById('login-error').style.display='none';
  S.currentUser={ name:acc.name, menage:acc.menage, admin:acc.admin };
  saveSession({ name:acc.name });
  logActivity('login', acc.name);
  showApp();
};

window.doLogout = function(){
  logActivity('logout', S.currentUser?.name || '—');
  clearSession();
  S.currentUser=null;
  document.getElementById('login-pwd').value='';
  checkAuth();
};

// ─── Firebase ─────────────────────────────────────────────────────────────────

function setSyncStatus(s, extra){
  document.getElementById('sync-dot').className='sync-dot '+s;
  document.getElementById('sync-label').textContent=s==='ok'?(extra||'Synchronisé'):s==='err'?'Hors ligne':'Chargement...';
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

function fbSet(path,data){ set(ref(db,path),data).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err')); }

function checkReady(){
  // On affiche dès que les données essentielles sont là
  const essentialLoaded = loaded.config && loaded.assignments && loaded.reservations;
  if(essentialLoaded && !fbReady){
    fbReady=true;
    setStatus('');
    checkAuth();
  } else if(fbReady){
    render();
  }
}

setStatus('Chargement...', true);

onValue(ref(db,'config'), snap=>{
  const d=snap.val();
  if(d){ S.cleaners=d.cleaners||[]; S.studioNames=d.studioNames||S.studioNames; }
  setSyncStatus('ok'); loaded.config=true;
  fbReady?render():checkReady();
});

onValue(ref(db,'assignments'), snap=>{
  S.assignments=snap.val()||{}; loaded.assignments=true;
  fbReady?render():checkReady();
});

onValue(ref(db,'reservations'), snap=>{
  const data=snap.val()||{};
  S.reservations=Object.values(data).map(r=>({...r,start:new Date(r.start),end:new Date(r.end)}));
  loaded.reservations=true; fbReady?render():checkReady();
});

onValue(ref(db,'adminConfig'), snap=>{
  const d=snap.val();
  if(d) S.adminConfig={...S.adminConfig,...d, accounts:d.accounts||[]};
  loaded.adminConfig=true;
  if(!fbReady){
    checkReady();
  } else {
    // adminConfig chargé après → re-vérifier auth si auth activée
    if(S.adminConfig.authEnabled && S.currentUser?.noAuth){
      checkAuth();
    } else {
      render();
    }
  }
}, ()=>{
  loaded.adminConfig=true;
  fbReady?render():checkReady();
});

onValue(ref(db,'lastSync'), snap=>{
  const d=snap.val();
  if(d&&d.ts){
    const fmt=new Date(d.ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const el=document.getElementById('last-sync-info');
    if(el) el.textContent=`Dernière sync : ${fmt}`;
    setSyncStatus('ok',`Sync ${fmt}`);
  }
});

function saveAssignments(){ fbSet('assignments', Object.keys(S.assignments).length?S.assignments:null); }

// ─── Helpers ──────────────────────────────────────────────────────────────────

function setStatus(msg,loading=false){
  document.getElementById('status-bar').innerHTML=loading?`<span class="spinner"></span><span>${msg}</span>`:`<span>${msg}</span>`;
}

const getKey=r=>r.uid;
function getAssignment(r){
  const a=S.assignments[getKey(r)];
  if(!a) return {c1:null,c2:null,note:''};
  if(typeof a==='string') return {c1:a,c2:null,note:''};
  return {c1:a.cleaner||a.c1||null,c2:a.c2||null,note:a.note||''};
}

function cleanerColor(n){
  const accounts=S.adminConfig.accounts||[];
  const i=accounts.findIndex(a=>a.name===n);
  return i>=0?CLEANER_COLORS[i%CLEANER_COLORS.length]:'#aaa';
}

function dayTime(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }

function getResasForDay(d,si){
  const t=dayTime(d);
  return S.reservations.filter(r=>r.studio===si && t>=dayTime(r.start) && t<dayTime(r.end));
}

function getCheckouts(d,si){
  const t=dayTime(d);
  return S.reservations.filter(r=>r.studio===si && dayTime(r.end)===t);
}

function getDayPip(d){
  const checkouts=[];
  for(let si=0;si<2;si++) checkouts.push(...getCheckouts(d,si));
  if(!checkouts.length) return null;
  let assigned=0;
  for(const r of checkouts){ const {c1,c2}=getAssignment(r); if(c1||c2) assigned++; }
  if(assigned===0) return 'red';
  if(assigned<checkouts.length) return 'orange';
  return null;
}

// ─── Render ───────────────────────────────────────────────────────────────────

function renderKpi(){
  const yr=S.currentYear, mo=S.currentMonth;
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDay=new Date(yr,mo,1), lastDay=new Date(yr,mo+1,0);
  const checkoutsMonth=S.reservations.filter(r=>{
    const e=new Date(r.end.getFullYear(),r.end.getMonth(),r.end.getDate());
    return e>=firstDay && e<=lastDay && e>=today;
  });
  const total=checkoutsMonth.length;
  const assigned=checkoutsMonth.filter(r=>{ const {c1,c2}=getAssignment(r); return c1||c2; }).length;
  const unassigned=total-assigned;
  let scoreColor=total===0||assigned===total?'green':assigned/total>=0.7?'orange':'red';

  const nextUnassigned=S.reservations
    .filter(r=>{ const e=new Date(r.end.getFullYear(),r.end.getMonth(),r.end.getDate()); const {c1,c2}=getAssignment(r); return e>=today&&!c1&&!c2; })
    .sort((a,b)=>a.end-b.end)[0];

  let nextLabel='Aucun', nextColor='green';
  if(nextUnassigned){
    const diff=Math.round((new Date(nextUnassigned.end.getFullYear(),nextUnassigned.end.getMonth(),nextUnassigned.end.getDate())-today)/86400000);
    nextLabel=diff===0?'Aujourd\'hui':diff===1?'Demain':`J-${diff}`;
    nextColor=diff<=2?'red':diff<=5?'orange':'green';
  }

  document.getElementById('kpi-bar').innerHTML=`
    <div class="kpi-card"><div class="kpi-value ${scoreColor}">${assigned}/${total}</div><div class="kpi-label">Départs assignés<br>ce mois</div></div>
    <div class="kpi-card"><div class="kpi-value ${unassigned>0?(unassigned>=3?'red':'orange'):'green'}">${unassigned}</div><div class="kpi-label">Non assigné${unassigned>1?'s':''}<br>restant${unassigned>1?'s':''}</div></div>
    <div class="kpi-card"><div class="kpi-value ${nextColor}" style="font-size:16px;padding-top:3px">${nextLabel}</div><div class="kpi-label">Prochain départ<br>sans intervenante</div></div>
    <div class="kpi-filter-card">
      <div class="kpi-filter-btns">
        <button class="kpi-filter-btn arr${S.filterType==='all'||S.filterType==='arr'?' active':''}" onclick="window._toggleType('arr')">Arrivées</button>
        <button class="kpi-filter-btn dep${S.filterType==='all'||S.filterType==='dep'?' active':''}" onclick="window._toggleType('dep')">Départs</button>
      </div>
    </div>`;
}

function renderControls(){
  const cleaners=S.adminConfig.accounts?S.adminConfig.accounts.filter(a=>a.menage).map(a=>a.name):S.cleaners;
  const chips=cleaners.map(c=>{
    const col=cleanerColor(c);
    const isActive=S.filterCleaner===c;
    const style=isActive?`background:${col};color:#fff;border-color:${col}`:`border-left:3px solid ${col};color:#555;padding-left:8px`;
    return `<button class="chip" style="${style}" onclick="window._sf('${c}')">${c}</button>`;
  }).join('');
  document.getElementById('controls-row').innerHTML=`
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <button class="chip" style="${!S.filterCleaner?'background:#555;color:#fff;border-color:#555;font-size:14px':'background:none;color:#aaa;border-color:transparent;font-size:14px'}" onclick="window._sf(null)">👥</button>
      ${chips}
    </div>`;
}

function renderCalendar(){
  const yr=S.currentYear, mo=S.currentMonth;
  const first=new Date(yr,mo,1), last=new Date(yr,mo+1,0);
  let sd=first.getDay(); if(sd===0)sd=7;
  const today=new Date(); today.setHours(0,0,0,0);
  const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const user=S.currentUser;
  const isAdminOrNoAuth=!user||user.noAuth||user.admin;
  const showArr=S.filterType==='all'||S.filterType==='arr';
  const showDep=S.filterType==='all'||S.filterType==='dep';

  let html=DAYS.map(d=>`<div class="day-header">${d}</div>`).join('');

  const cell=(d,other)=>{
    const isToday=d.getTime()===today.getTime();
    const pip=other?null:getDayPip(d);
    const pipHtml=pip?`<span class="status-pip ${pip}"></span>`:'';
    let inner=`<div class="day-num-row"><span class="day-num">${d.getDate()}</span>${pipHtml}</div>`;

    for(let si=0;si<2;si++){
      if(showDep){
        for(const r of getCheckouts(d,si)){
          const {c1,c2}=getAssignment(r);
          if(S.filterCleaner && c1!==S.filterCleaner && c2!==S.filterCleaner) continue;
          inner+=`<div class="resa-block checkout" onclick="window._oa('${getKey(r)}')" title="Départ — ${S.studioNames[si]}">Départ S${si+1}</div>`;
          // Tout le monde voit les noms assignés
          if(c1||c2){
            inner+=`<div class="assign-wrap">`;
            if(c1) inner+=`<span class="assign-badge" style="color:${cleanerColor(c1)}">${c1}</span> `;
            if(c2) inner+=`<span class="assign-badge" style="color:${cleanerColor(c2)}">${c2}</span>`;
            inner+=`</div>`;
          }
        }
      }
      if(showArr){
        for(const r of getResasForDay(d,si)){
          if(S.filterCleaner){
            const {c1,c2}=getAssignment(r);
            if(c1!==S.filterCleaner && c2!==S.filterCleaner) continue;
          }
          const isStart=dayTime(d)===dayTime(r.start);
          if(isStart){
            // Arrivées : cliquables uniquement pour admin, lecture seule pour ménage
            if(isAdminOrNoAuth){
              inner+=`<div class="resa-block s${si+1}" onclick="window._oa('${getKey(r)}')" title="${r.summary}">S${si+1}</div>`;
            } else {
              inner+=`<div class="resa-block s${si+1}" title="${r.summary}" style="cursor:default">S${si+1}</div>`;
            }
          }
        }
      }
    }
    return `<div class="day-cell${other?' other-month':''}${isToday?' today':''}">${inner}</div>`;
  };

  for(let i=1;i<sd;i++) html+=cell(new Date(yr,mo,1-sd+i),true);
  for(let i=1;i<=last.getDate();i++) html+=cell(new Date(yr,mo,i),false);
  const rem=7-((sd-1+last.getDate())%7);
  if(rem<7) for(let i=1;i<=rem;i++) html+=cell(new Date(yr,mo+1,i),true);
  document.getElementById('calendar-view').innerHTML=`<div class="calendar-grid">${html}</div>`;
}

function renderLegend(){
  document.getElementById('legend-bar').innerHTML=`
    <div class="legend-item"><div class="legend-dot" style="background:#daeafe"></div>${S.studioNames[0]}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c6f0df"></div>${S.studioNames[1]}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fde8b0"></div>Départ</div>
    <div class="legend-item"><span class="legend-pip" style="background:#E24B4A"></span>Non assigné</div>
    <div class="legend-item"><span class="legend-pip" style="background:#F59E0B"></span>Partiel</div>`;
}

function renderSettings(){
  document.getElementById('name-s1') && (document.getElementById('name-s1').value=S.studioNames[0]);
  document.getElementById('name-s2') && (document.getElementById('name-s2').value=S.studioNames[1]);
}

function render(){
  if(!S.currentUser) return;
  const MO=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('month-title').textContent=MO[S.currentMonth]+' '+S.currentYear;
  document.getElementById('topbar-sub').textContent=S.studioNames.join(' · ');
  renderKpi();
  renderControls();
  renderCalendar();
  renderLegend();
}

// ─── Modal assignation ────────────────────────────────────────────────────────

function findResa(key){ return S.reservations.find(r=>getKey(r)===key)||null; }

window._oa = function(key){
  const r=findResa(key); if(!r) return;
  const {c1,c2,note}=getAssignment(r);
  const user=S.currentUser;
  const isAdminOrNoAuth=!user||user.noAuth||user.admin;
  const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const n=Math.round((r.end-r.start)/86400000);

  if(!isAdminOrNoAuth && user?.menage){
    // Vue ménage : juste s'assigner ou se retirer
    const alreadyAssigned=c1===user.name||c2===user.name;
    document.getElementById('modal-container').innerHTML=`
      <div class="modal-overlay" onclick="if(event.target===this)window._cm()">
        <div class="modal">
          <h3>${alreadyAssigned?'Mon intervention':'M\'assigner'}</h3>
          <div class="modal-meta">
            <strong>${S.studioNames[r.studio]}</strong><br>
            Arrivée : ${fmt(r.start)}<br>
            Départ : ${fmt(r.end)} (${n} nuit${n>1?'s':''})</div>
          ${alreadyAssigned
            ? `<p style="font-size:13px;color:#555;margin-bottom:1rem">Vous êtes assignée à ce départ.</p>
               <div class="modal-btns">
                 <button class="btn-cancel" onclick="window._cm()">Fermer</button>
                 <button class="btn-danger" onclick="window._removeSelf('${key}')">✕ Me retirer</button>
               </div>`
            : `<p style="font-size:13px;color:#555;margin-bottom:1rem">Cliquez sur + pour vous assigner à ce départ.</p>
               <div class="modal-btns">
                 <button class="btn-cancel" onclick="window._cm()">Annuler</button>
                 <button class="btn-primary" onclick="window._assignSelf('${key}')">+ M'assigner</button>
               </div>`
          }
        </div>
      </div>`;
    return;
  }

  // Vue admin : liste complète
  const cleaners=S.adminConfig.accounts?S.adminConfig.accounts.filter(a=>a.menage).map(a=>a.name):S.cleaners;
  const opts=sel=>`<option value="">— Aucune —</option>`+cleaners.map(x=>`<option value="${x}"${sel===x?' selected':''}>${x}</option>`).join('');
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)window._cm()">
      <div class="modal">
        <h3>Assigner les intervenantes</h3>
        <div class="modal-meta">
          <strong>${S.studioNames[r.studio]}</strong><br>
          Arrivée : ${fmt(r.start)}<br>
          Départ : ${fmt(r.end)} (${n} nuit${n>1?'s':''})<br>
          ${r.summary&&r.summary!=='Réservation'?'Voyageur : '+r.summary:''}
        </div>
        <div class="modal-section-title">Intervenante 1</div>
        <div class="modal-field"><select id="mc1">${opts(c1)}</select></div>
        <div class="modal-section-title">Intervenante 2 (optionnel)</div>
        <div class="modal-field"><select id="mc2">${opts(c2)}</select></div>
        <div class="modal-field" style="margin-top:0.5rem">
          <label>Note</label>
          <input type="text" id="mn" placeholder="Ex: clé boîte..." value="${note}">
        </div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="window._cm()">Annuler</button>
          <button class="btn-primary" onclick="window._sa('${key}')">Enregistrer</button>
        </div>
      </div>
    </div>`;
};

window._assignSelf = function(key){
  const user=S.currentUser; if(!user) return;
  const r=findResa(key);
  const {c1,c2,note}=getAssignment(r||{uid:key});
  if(!c1) S.assignments[key]={c1:user.name,c2:c2||null,note};
  else if(!c2) S.assignments[key]={c1,c2:user.name,note};
  else { showToast('2 intervenantes déjà assignées'); window._cm(); return; }
  const studioLabel = r ? `${S.studioNames[r.studio]} — départ ${r.end.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}` : key;
  logActivity('assign', user.name, studioLabel);
  saveAssignments();
  showToast('Assignée ✓');
  window._cm(); render();
};

window._removeSelf = function(key){
  const user=S.currentUser; if(!user) return;
  const r=findResa(key);
  const {c1,c2,note}=getAssignment(r||{uid:key});
  if(c1===user.name) S.assignments[key]={c1:c2||null,c2:null,note};
  else if(c2===user.name) S.assignments[key]={c1,c2:null,note};
  if(!S.assignments[key].c1&&!S.assignments[key].c2) delete S.assignments[key];
  const studioLabel = r ? `${S.studioNames[r.studio]} — départ ${r.end.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}` : key;
  logActivity('unassign', user.name, studioLabel);
  saveAssignments();
  showToast('Retirée ✓');
  window._cm(); render();
};

window._sa = function(key){
  const c1=document.getElementById('mc1').value;
  const c2=document.getElementById('mc2').value;
  const note=document.getElementById('mn').value;
  if(c1||c2) S.assignments[key]={c1:c1||null,c2:c2||null,note};
  else delete S.assignments[key];
  const r=findResa(key);
  const studioLabel = r ? `${S.studioNames[r.studio]} — départ ${r.end.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}` : key;
  const assignedNames=[c1,c2].filter(Boolean).join(' + ')||'—';
  logActivity('assign', S.currentUser?.name||'Admin', `${studioLabel} → ${assignedNames}`);
  saveAssignments();
  showToast([c1,c2].filter(Boolean).join(' + ')||'Assignation supprimée');
  window._cm(); render();
};

window._cm=()=>document.getElementById('modal-container').innerHTML='';
window._sf=n=>{ S.filterCleaner=n; render(); };
window._toggleType=t=>{
  if(S.filterType==='all') S.filterType=t==='arr'?'dep':'arr';
  else if(S.filterType===t) S.filterType='none';
  else if(S.filterType==='none') S.filterType=t;
  else S.filterType='all';
  render();
};

window.toggleSettings=()=>{};
window.changeMonth=d=>{
  if(d===0){S.currentMonth=new Date().getMonth();S.currentYear=new Date().getFullYear();}
  else{S.currentMonth+=d;if(S.currentMonth>11){S.currentMonth=0;S.currentYear++;}if(S.currentMonth<0){S.currentMonth=11;S.currentYear--;}}
  render();
};
</script>
</body>
</html>
